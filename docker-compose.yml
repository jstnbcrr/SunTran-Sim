services:
  backend:
    build:
      context: ./backend
    container_name: suntran-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/../data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: suntran-frontend
    ports:
      - "0.0.0.0:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
